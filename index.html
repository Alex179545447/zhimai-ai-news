<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智脉AI日报 - 财经新闻聚合平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --accent-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --dark-bg: #0a0a1a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark-bg);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(118, 75, 162, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(79, 172, 254, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* 顶部导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(10, 10, 26, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: var(--primary-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--secondary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .user-avatar:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(245, 87, 108, 0.5);
        }

        .subscription-tag {
            padding: 6px 14px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #000;
        }

        .settings-btn {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: rotate(30deg);
        }

        .settings-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--text-secondary);
        }

        /* 主内容区 */
        .main-content {
            padding: 100px 40px 60px;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* 日期标题 */
        .date-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .date-label {
            display: inline-block;
            padding: 8px 24px;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .main-title {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #fff 0%, #a5c8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 18px;
            color: var(--text-secondary);
        }

        /* 热搜榜 */
        .hot-search-section {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 700;
        }

        .hot-icon {
            font-size: 28px;
        }

        .expand-btn {
            padding: 8px 18px;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .expand-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .hot-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .hot-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .hot-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .hot-rank {
            font-size: 18px;
            font-weight: 800;
            min-width: 30px;
        }

        .rank-1 { color: #ff4d4f; }
        .rank-2 { color: #ffc107; }
        .rank-3 { color: #52c41a; }

        .hot-title {
            flex: 1;
            font-size: 15px;
            font-weight: 500;
        }

        .hot-tag {
            padding: 4px 10px;
            background: rgba(255, 77, 79, 0.2);
            border-radius: 6px;
            font-size: 11px;
            color: #ff4d4f;
        }

        .hidden-items {
            display: none;
        }

        .hidden-items.show {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 15px;
        }

        /* 新闻卡片网格 */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .news-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .news-card:hover {
            transform: translateY(-5px);
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .news-category {
            display: inline-block;
            padding: 6px 14px;
            background: var(--primary-gradient);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .news-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .news-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .news-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .news-source {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .news-time {
            color: rgba(255, 255, 255, 0.5);
        }

        /* 会员权益区 */
        .membership-section {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 40px;
        }

        .membership-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .membership-badge {
            display: inline-block;
            padding: 8px 20px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            color: #000;
            margin-bottom: 15px;
        }

        .membership-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .membership-subtitle {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 35px;
        }

        .comparison-table th,
        .comparison-table td {
            padding: 15px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .comparison-table th {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .comparison-table th:last-child {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 140, 0, 0.1));
            color: #ffd700;
        }

        .comparison-table td {
            font-size: 14px;
        }

        .comparison-table td:last-child {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.05), rgba(255, 140, 0, 0.05));
        }

        .check-icon { color: #52c41a; }
        .cross-icon { color: rgba(255, 255, 255, 0.3); }

        .pricing-cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .pricing-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            min-width: 180px;
            text-align: center;
            transition: all 0.3s;
        }

        .pricing-card:hover {
            transform: scale(1.05);
        }

        .pricing-card.featured {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 140, 0, 0.15));
            border-color: rgba(255, 215, 0, 0.5);
            position: relative;
        }

        .pricing-card.featured::before {
            content: '推荐';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            padding: 4px 16px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            color: #000;
        }

        .pricing-period {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .pricing-amount {
            font-size: 36px;
            font-weight: 900;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .pricing-card.featured .pricing-amount {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .pricing-unit {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .subscribe-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: var(--primary-gradient);
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .pricing-card.featured .subscribe-btn {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000;
        }

        .subscribe-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: all 0.3s;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .modal-title {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 10px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-subtitle {
            color: var(--text-secondary);
            font-size: 15px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .category-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 18px 20px;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .category-item:hover {
            border-color: rgba(102, 126, 234, 0.5);
            background: rgba(102, 126, 234, 0.1);
        }

        .category-item.selected {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.2);
        }

        .category-icon {
            font-size: 24px;
        }

        .category-name {
            font-size: 15px;
            font-weight: 600;
        }

        .category-check {
            margin-left: auto;
            width: 22px;
            height: 22px;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .category-item.selected .category-check {
            background: #667eea;
            border-color: #667eea;
        }

        .category-check::after {
            content: '';
            width: 8px;
            height: 5px;
            border-left: 2px solid #fff;
            border-bottom: 2px solid #fff;
            transform: rotate(-45deg) translateY(-1px);
            opacity: 0;
            transition: all 0.2s;
        }

        .category-item.selected .category-check::after {
            opacity: 1;
        }

        .modal-footer {
            text-align: center;
        }

        .start-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-gradient);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .start-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 设置面板 */
        .settings-panel {
            position: absolute;
            top: 80px;
            right: 40px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            width: 320px;
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s;
        }

        .settings-panel.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .settings-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .current-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tag-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: var(--glass-bg);
            border-radius: 20px;
            font-size: 13px;
        }

        .tag-remove {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(255, 77, 79, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
            color: #ff4d4f;
        }

        .tag-remove:hover {
            background: rgba(255, 77, 79, 0.5);
        }

        .add-category-btn {
            width: 100%;
            padding: 12px;
            background: var(--glass-bg);
            border: 1px dashed var(--border-color);
            border-radius: 12px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .add-category-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .save-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .save-btn:hover {
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .navbar {
                padding: 0 20px;
            }

            .main-content {
                padding: 90px 20px 40px;
            }

            .main-title {
                font-size: 32px;
            }

            .hot-list {
                grid-template-columns: 1fr;
            }

            .hidden-items.show {
                grid-template-columns: 1fr;
            }

            .news-grid {
                grid-template-columns: 1fr;
            }

            .pricing-cards {
                flex-direction: column;
                align-items: center;
            }

            .pricing-card {
                width: 100%;
                max-width: 250px;
            }

            .category-grid {
                grid-template-columns: 1fr;
            }

            .settings-panel {
                width: calc(100% - 40px);
                right: 20px;
            }

            .nav-right {
                gap: 10px;
            }

            .subscription-tag {
                display: none;
            }
        }

        /* 动画 */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .live-indicator {
            width: 8px;
            height: 8px;
            background: #52c41a;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon">AI</div>
            <span class="logo-text">智脉AI日报</span>
        </div>
        <div class="nav-right">
            <span class="subscription-tag">Pro会员</span>
            <div class="user-avatar" id="userAvatar">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="white">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>
            <div class="settings-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                </svg>
            </div>
        </div>
    </nav>

    <!-- 设置面板 -->
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-title">订阅设置</div>
        <div class="current-tags" id="currentTags">
            <!-- 动态填充 -->
        </div>
        <button class="add-category-btn" id="addCategoryBtn">+ 添加更多板块</button>
        <button class="save-btn" id="saveSettingsBtn">保存设置</button>
    </div>

    <!-- 首次访问弹窗 -->
    <div class="modal-overlay" id="interestModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">选择你关心的内容</h2>

        const newsData = [

        const categoryNames = {
            'ai': '🤖 AI/科技',

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {

        // 渲染热搜榜
        function renderHotSearch() {
            const hotList = document.getElementById('hotList');
            const hiddenItems = document.getElementById('hiddenItems');
            
            hotList.innerHTML = hotSearchData.slice(0, 10).map(item => `
                <div class="hot-item">
                    <span class="hot-rank rank-${item.rank <= 3 ? item.rank : ''}">${item.rank}</span>
                    <span class="hot-title">${item.title}</span>
                    ${item.tag ? `<span class="hot-tag">${item.tag}</span>` : ''}
                </div>
            `).join('');

            hiddenItems.innerHTML = hotSearchData.slice(10).map(item => `
                <div class="hot-item">
                    <span class="hot-rank">${item.rank}</span>
                    <span class="hot-title">${item.title}</span>
                    ${item.tag ? `<span class="hot-tag">${item.tag}</span>` : ''}
                </div>
            `).join('');
        }

        // 渲染新闻
        function renderNews() {
            const newsGrid = document.getElementById('newsGrid');
            newsGrid.innerHTML = newsData.map(item => `
                <article class="news-card">
                    <span class="news-category">${item.categoryName}</span>
                    <h3 class="news-title">${item.title}</h3>
                    <p class="news-desc">${item.desc}</p>
                    <div class="news-meta">
                        <span class="news-source">

                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                            </svg>
                            ${item.source}
                        </span>
                        <span class="news-time">${item.time}</span>
                    </div>
                </article>
            `).join('');
        }

        // 热搜展开/收起
        document.getElementById('expandBtn').addEventListener('click', function() {
            const hiddenItems = document.getElementById('hiddenItems');
            const btn = this;
            
            if (hiddenItems.classList.contains('show')) {
                hiddenItems.classList.remove('show');
                btn.textContent = '查看更多热搜';
            } else {
                hiddenItems.classList.add('show');
                btn.textContent = '收起热搜';
            }
        });

        // 兴趣选择弹窗
        function initInterestModal() {
            const modal = document.getElementById('interestModal');
            const categoryItems = document.querySelectorAll('.category-item');
            const startBtn = document.getElementById('startBtn');

            // 检查是否首次访问
            const hasSelected = localStorage.getItem('selectedCategories');
            if (!hasSelected) {
                modal.classList.add('active');
            }

            let selectedCategories = new Set();

            categoryItems.forEach(item => {
                item.addEventListener('click', function() {
                    const category = this.dataset.category;
                    
                    if (selectedCategories.has(category)) {
                        selectedCategories.delete(category);
                        this.classList.remove('selected');
                    } else {
                        selectedCategories.add(category);
                        this.classList.add('selected');
                    }

                    startBtn.disabled = selectedCategories.size === 0;
                });
            });

            startBtn.addEventListener('click', function() {
                if (selectedCategories.size > 0) {
                    localStorage.setItem('selectedCategories', JSON.stringify([...selectedCategories]));
                    modal.classList.remove('active');
                    updateSettingsTags();
                }
            });
        }

        // 设置面板
        function initSettings() {
            const userAvatar = document.getElementById('userAvatar');
            const settingsPanel = document.getElementById('settingsPanel');
            const addCategoryBtn = document.getElementById('addCategoryBtn');
            const saveBtn = document.getElementById('saveSettingsBtn');

            userAvatar.addEventListener('click', function(e) {
                e.stopPropagation();
                settingsPanel.classList.toggle('active');
            });

            document.addEventListener('click', function(e) {
                if (!settingsPanel.contains(e.target) && !userAvatar.contains(e.target)) {
                    settingsPanel.classList.remove('active');
                }
            });

            addCategoryBtn.addEventListener('click', function() {
                settingsPanel.classList.remove('active');
                document.getElementById('interestModal').classList.add('active');
            });

            saveBtn.addEventListener('click', function() {
                const categories = JSON.parse(localStorage.getItem('selectedCategories') || '[]');
                settingsPanel.classList.remove('active');
            });

            updateSettingsTags();
        }

        function updateSettingsTags() {
            const container = document.getElementById('currentTags');
            const categories = JSON.parse(localStorage.getItem('selectedCategories') || '["ai", "stock"]');

            container.innerHTML = categories.map(cat => `
                <span class="tag-item">
                    ${categoryNames[cat]}
                    <span class="tag-remove" data-category="${cat}">×</span>
                </span>
            `).join('');

            container.querySelectorAll('.tag-remove').forEach(btn => {
                btn.addEventListener('click', function() {
                    const catToRemove = this.dataset.category;
                    let categories = JSON.parse(localStorage.getItem('selectedCategories') || '[]');
                    categories = categories.filter(c => c !== catToRemove);
                    localStorage.setItem('selectedCategories', JSON.stringify(categories));
                    updateSettingsTags();
                });
            });
        }
    </script>
