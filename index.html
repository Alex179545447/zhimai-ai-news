<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>閺呴缚鍓I閺冦儲濮?- 鐠愩垻绮￠弬浼存閼辨艾鎮?/title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --accent-blue: #0ea5e9;
            --accent-cyan: #06b6d4;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --accent-green: #22c55e;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* 娑撹顔愰崳?*/
        .container {
            max-width: 640px;
            margin: 0 auto;
            background: var(--bg-primary);
            min-height: 100vh;
            box-shadow: 0 0 40px rgba(0,0,0,0.05);
        }

        /* 妞ゅ爼鍎撮弽鍥暯閺?*/
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-primary);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .date-display {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .settings-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .settings-btn:hover {
            background: var(--border-color);
        }

        .settings-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--text-secondary);
        }

        /* 鐢倸婧€閸╅缚鐨熼崡锛勫 */
        .market-card {
            margin: 16px 20px;
            padding: 20px;
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
            border: 2px solid var(--accent-orange);
            border-radius: var(--radius-lg);
            position: relative;
            overflow: hidden;
        }

        .market-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-orange), #fbbf24);
        }

        .market-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .market-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: var(--accent-orange);
            color: white;
            font-size: 12px;
            font-weight: 600;
            border-radius: 20px;
        }

        .market-title {
            font-size: 15px;
            font-weight: 600;
            color: #92400e;
            margin-bottom: 8px;
        }

        .market-desc {
            font-size: 14px;
            color: #b45309;
            line-height: 1.7;
        }

        /* 閺嶅洨顒烽弽?*/
        .tags-bar {
            position: sticky;
            top: 73px;
            z-index: 90;
            background: var(--bg-primary);
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .tags-scroll {
            display: flex;
            gap: 8px;
            padding: 0 20px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .tags-scroll::-webkit-scrollbar {
            display: none;
        }

        .tag-item {
            flex-shrink: 0;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tag-item:hover {
            background: var(--border-color);
        }

        .tag-item.active {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border-color: transparent;
            color: white;
            font-weight: 500;
        }

        /* 閸愬懎顔愰崠?*/
        .content {
            padding: 0 0 24px 0;
        }

        /* 閺嶅繒娲伴崠鍝勬健 */
        .section {
            margin-top: 16px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .section-header:hover {
            background: var(--bg-secondary);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-icon {
            font-size: 18px;
        }

        .section-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .section-count {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-secondary);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .expand-icon {
            width: 20px;
            height: 20px;
            fill: var(--text-muted);
            transition: transform 0.3s;
        }

        .section.collapsed .expand-icon {
            transform: rotate(-90deg);
        }

        .section-content {
            padding: 0 20px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .section.collapsed .section-content {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            opacity: 0;
        }

        /* 閺備即妞堥崡锛勫 */
        .news-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .news-item:last-child {
            margin-bottom: 0;
        }

        .news-item:hover {
            border-color: var(--accent-blue);
            box-shadow: var(--shadow-md);
        }

        .news-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            background: var(--bg-secondary);
            border-radius: 6px;
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .news-tag.hot {
            background: #fef2f2;
            color: var(--accent-red);
        }

        .news-tag.policy {
            background: #f0fdf4;
            color: var(--accent-green);
        }

        .news-tag.tech {
            background: #eff6ff;
            color: var(--accent-blue);
        }

        /* 閼奉亜鐣炬稊澶嬬垼缁涢箖鐝禍?*/
        .news-item.tag-matched {
            border-color: var(--accent-cyan);
            background: linear-gradient(135deg, #f0fdff 0%, #ffffff 100%);
            box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.2);
        }

        .news-item.tag-matched::before {
            content: '閴?閸栧綊鍘ら幃銊ф畱閸忕鍙?;
            display: block;
            font-size: 11px;
            color: var(--accent-cyan);
            margin-bottom: 8px;
            font-weight: 500;
        }

        /* 閹存垹娈戦幒銊ㄥ礃閻楀牆娼?*/
        .recommendation-section {
            margin: 16px 20px;
            padding: 16px;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border: 2px solid var(--accent-cyan);
            border-radius: var(--radius-lg);
        }

        .recommendation-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .recommendation-header svg {
            width: 24px;
            height: 24px;
            fill: var(--accent-cyan);
        }

        .recommendation-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .recommendation-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            margin-left: auto;
        }

        .realtime-search-btn {
            margin-left: 8px;
            padding: 6px 12px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border: none;
            border-radius: 16px;
            font-size: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .realtime-search-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(14, 165, 233, 0.3);
        }

        .realtime-search-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .realtime-news {
            border-left: 3px solid var(--accent-cyan);
        }

        .recommendation-desc {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
            line-height: 1.4;
        }

        .matched-tag {
            background: rgba(6, 182, 212, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--accent-cyan);
        }

        .loading {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .recommendation-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .recommendation-tag {
            padding: 4px 10px;
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 12px;
            font-size: 12px;
            color: var(--accent-cyan);
        }

        .recommendation-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .recommendation-item {
            padding: 12px;
            background: white;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
        }

        .recommendation-item:hover {
            box-shadow: var(--shadow-md);
        }

        .recommendation-item-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .recommendation-item-meta {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .no-recommendation {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .news-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.5;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .news-source {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .news-brief {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 10px;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 閻戭厽鎮冲?*/
        .hot-list {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .hot-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s;
        }

        .hot-item:last-child {
            border-bottom: none;
        }

        .hot-item:hover {
            background: var(--bg-secondary);
        }

        .hot-rank {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            border-radius: 6px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .hot-rank.top1 {
            background: linear-gradient(135deg, #ef4444, #f87171);
            color: white;
        }

        .hot-rank.top2 {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: white;
        }

        .hot-rank.top3 {
            background: linear-gradient(135deg, #22c55e, #4ade80);
            color: white;
        }

        .hot-title {
            flex: 1;
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.4;
        }

        .hot-tag {
            font-size: 10px;
            padding: 2px 6px;
            background: #fef2f2;
            color: var(--accent-red);
            border-radius: 4px;
        }

        /* 鎼存洟鍎寸悰銊︾壐 */
        .summary-table-section {
            margin: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .table-header {
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .table-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
        }

        .summary-table th,
        .summary-table td {
            padding: 14px 16px;
            text-align: left;
            font-size: 13px;
            border-bottom: 1px solid var(--border-color);
        }

        .summary-table th {
            background: var(--bg-secondary);
            font-weight: 500;
            color: var(--text-secondary);
        }

        .summary-table td {
            color: var(--text-primary);
        }

        .summary-table tr:last-child td {
            border-bottom: none;
        }

        .sector-tag {
            display: inline-block;
            padding: 3px 8px;
            background: #eff6ff;
            color: var(--accent-blue);
            border-radius: 4px;
            font-size: 12px;
        }

        /* 妞や絻鍓?*/
        .footer {
            padding: 24px 20px;
            background: var(--bg-secondary);
            text-align: center;
            border-top: 1px solid var(--border-color);
        }

        .footer-brand {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .footer-source {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .footer-disclaimer {
            font-size: 11px;
            color: var(--text-muted);
            max-width: 400px;
            margin: 0 auto;
        }

        /* 閸旂姾娴囬弴鏉戭樋 */
        .load-more {
            display: block;
            width: calc(100% - 40px);
            margin: 16px 20px 0;
            padding: 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .load-more:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        /* 瀵湱鐛?*/
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.95);
            transition: transform 0.3s;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 17px;
            font-weight: 600;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-secondary);
        }

        .modal-body {
            padding: 20px;
        }

        .subscription-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .subscription-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s;
        }

        .subscription-item:hover {
            border-color: var(--accent-blue);
        }

        .subscription-item.selected {
            border-color: var(--accent-blue);
            background: #eff6ff;
        }

        .subscription-icon {
            font-size: 20px;
        }

        .subscription-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .subscription-check {
            margin-left: auto;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .subscription-item.selected .subscription-check {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .subscription-item.selected .subscription-check::after {
            content: '';
            width: 8px;
            height: 5px;
            border-left: 2px solid white;
            border-bottom: 2px solid white;
            transform: rotate(-45deg) translateY(-1px);
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
        }

        .save-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .save-btn:hover {
            opacity: 0.9;
        }

        .save-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 閼奉亜鐣炬稊澶嬬垼缁涚偓鐗卞?*/
        .custom-tags-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed var(--border-color);
        }

        .custom-tags-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .add-tag-btn {
            padding: 6px 12px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
        }

        .custom-tags-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .custom-tag-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--bg-secondary);
            border-radius: 16px;
            font-size: 13px;
        }

        .custom-tag-item .remove-tag {
            cursor: pointer;
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1;
        }

        .custom-tag-item .remove-tag:hover {
            color: var(--accent-red);
        }

        .custom-tag-input-wrapper {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .custom-tag-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        .confirm-tag-btn {
            padding: 10px 16px;
            background: var(--accent-blue);
            color: white;

                    });

                    listContainer.innerHTML = '<div class="no-recommendation">棣冩 閺嗗倹婀幍鎯у煂閸栧綊鍘ら惃鍕杽閺冭埖鏌婇梻浼欑礉閺勫孩妫╅弮鈺傚Г鐏忓棔璐熼幃銊﹀腹闁?/div>';
                }
            } catch (error) {
                console.error('鐎圭偞妞傞幖婊呭偍婢惰精瑙?', error);
                listContainer.innerHTML = '<div class="no-recommendation">閳跨媴绗?閹兼粎鍌ㄩ張宥呭閺嗗倹妞傛稉宥呭讲閻㈩煉绱濈拠椋庘棦閸氬骸鍟€鐠?/div>';
            } finally {
                isSearching = false;
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '棣冩敡 鐎圭偞妞傞幖婊呭偍';
                }
            }
        }

        function renderCustomTags() {
            const container = document.getElementById('customTagsList');
            if (!container) return;
            
            container.innerHTML = customTags.map(tag => `
                <div class="custom-tag-item">
                    <span>${tag}</span>
                    <span class="remove-tag" onclick="removeCustomTag('${tag}')">鑴?/span>
                </div>
            `).join('');
            
            // 閺囧瓨鏌婇幒銊ㄥ礃
            updateRecommendation();
        }

        function addCustomTag(tag) {
            if (tag && !customTags.includes(tag) && customTags.length < 10) {
                customTags.push(tag);
                localStorage.setItem('zhimai_custom_tags', JSON.stringify(customTags));
                renderCustomTags();
                trackAction('add_custom_tag', { tag: tag, total: customTags.length });
            }
        }

        function removeCustomTag(tag) {
            customTags = customTags.filter(t => t !== tag);
            localStorage.setItem('zhimai_custom_tags', JSON.stringify(customTags));
            renderCustomTags();
            trackAction('remove_custom_tag', { tag: tag, total: customTags.length });
        }

        // 閸掓繂顫愰崠鏍殰鐎规矮绠熼弽鍥╊劮
        document.addEventListener('DOMContentLoaded', function() {
            renderCustomTags();
            
            // 濞ｈ濮為弽鍥╊劮閹稿鎸?
            const addBtn = document.getElementById('addCustomTagBtn');
            const inputWrapper = document.getElementById('customTagInputWrapper');
            const confirmBtn = document.getElementById('confirmTagBtn');
            const cancelBtn = document.getElementById('cancelTagBtn');
            const input = document.getElementById('customTagInput');
            
            if (addBtn) {
                addBtn.addEventListener('click', function() {
                    inputWrapper.style.display = 'flex';
                    addBtn.style.display = 'none';
                    input.focus();
                });
            }
            
            if (confirmBtn) {
                confirmBtn.addEventListener('click', function() {
                    const tag = input.value.trim();
                    if (tag) {
                        addCustomTag(tag);
                        input.value = '';
                    }
                    inputWrapper.style.display = 'none';
                    addBtn.style.display = 'block';
                });
            }
            
            if (cancelBtn) {
                cancelBtn.addEventListener('click', function() {
                    input.value = '';
                    inputWrapper.style.display = 'none';
                    addBtn.style.display = 'block';
                });
            }
            
            if (input) {
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        confirmBtn.click();
                    }
                });
            }
        });
    </script>
</body>
</html>
